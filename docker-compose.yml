x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.tarantul:/root/.tarantul
  env_file:
    - .env

services:
  # ── API server + chat channels ──────────────────────────────
  tarantul-serve:
    container_name: tarantul-serve
    <<: *common
    command: ["serve", "--host", "0.0.0.0"]
    restart: unless-stopped
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  # ── Interactive CLI (on-demand) ─────────────────────────────
  tarantul-cli:
    <<: *common
    profiles:
      - cli
    command: ["agent"]
    stdin_open: true
    tty: true
